<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Météo App</title>
    <link rel="stylesheet" href="style.css">
    <!-- Police Google Fonts pour le style -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

    <div class="card">
        <div class="search">
            <input type="text" placeholder="Entrez une ville..." spellcheck="false">
            <button><img src="https://cdn-icons-png.flaticon.com/512/149/149852.png" alt="search"></button>
        </div>
        
        <div class="error">
            <p>Nom de ville invalide !</p>
        </div>

        <div class="weather">
            <img src="https://cdn-icons-png.flaticon.com/512/1163/1163657.png" class="weather-icon">
            <h1 class="temp">22°c</h1>
            <h2 class="city">Paris</h2>
            
            <div class="details">
                <div class="col">
                    <img src="https://cdn-icons-png.flaticon.com/512/3222/3222683.png" alt="humidity">
                    <div>
                        <p class="humidity">50%</p>
                        <p>Humidité</p>
                    </div>
                </div>
                <div class="col">
                    <img src="https://cdn-icons-png.flaticon.com/512/1506/1506761.png" alt="wind">
                    <div>
                        <p class="wind">15 km/h</p>
                        <p>Vent</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
